<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>共同文字雲</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 24px 20px 12px;
      text-align: center;
      background: linear-gradient(180deg, #1a1a3e 0%, transparent 100%);
    }

    header h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { color: #6b7280; font-size: 0.85rem; margin-top: 6px; }

    .input-section {
      width: 100%;
      max-width: 600px;
      padding: 20px 20px 0;
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #2d2d5e;
      background: #1a1a3e;
      color: #e0e0f0;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus { border-color: #a78bfa; }
    input[type="text"]::placeholder { color: #4b5563; }

    #btn-add {
      padding: 12px 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    .controls {
      width: 100%;
      max-width: 600px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .word-count { font-size: 0.82rem; color: #6b7280; }
    .word-count span { color: #a78bfa; font-weight: 700; }

    #btn-toggle {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid #a78bfa;
      background: #a78bfa;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
    }

    #btn-toggle.list-mode { background: transparent; color: #a78bfa; }

    /* 文字雲 */
    #cloud-view {
      width: 100%;
      max-width: 900px;
      min-height: 380px;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 6px 12px;
      border-radius: 20px;
      margin: 0 20px;
    }

    #cloud-view .cw {
      display: inline-block;
      cursor: default;
      transition: transform 0.2s;
      line-height: 1.2;
      white-space: nowrap;
    }

    #cloud-view .cw:hover { transform: scale(1.15); }

    /* 列表 */
    #list-view {
      width: 100%;
      max-width: 900px;
      padding: 10px 20px;
      display: none;
    }

    .word-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .word-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      background: #1a1a3e;
      border: 1px solid #2d2d5e;
      font-size: 0.9rem;
    }

    .tag-word { color: #c4b5fd; }
    .tag-count {
      font-size: 0.7rem;
      color: #6b7280;
      background: #2d2d5e;
      padding: 1px 6px;
      border-radius: 10px;
    }

    /* 空狀態 */
    .empty {
      color: #374151;
      font-size: 1rem;
      text-align: center;
      padding: 60px 0;
      width: 100%;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e1e4e;
      border: 1px solid #a78bfa;
      color: #c4b5fd;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 99;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* QR */
    .qr-section {
      padding: 28px 20px 36px;
      text-align: center;
    }

    .qr-section p { font-size: 0.75rem; color: #4b5563; margin-bottom: 10px; }

    .qr-section img {
      border-radius: 12px;
      border: 8px solid white;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<header>
  <h1>✨ 共同文字雲</h1>
  <p>輸入詞彙，與大家一起創造這片雲</p>
</header>

<div class="input-section">
  <input type="text" id="word-input" placeholder="輸入你的詞彙…" maxlength="20" autocomplete="off" />
  <button id="btn-add">加入 ＋</button>
</div>

<div class="controls">
  <div class="word-count">共 <span id="word-total">0</span> 個詞彙</div>
  <button id="btn-toggle">☁ 文字雲</button>
</div>

<div id="cloud-view"><div class="empty">還沒有詞彙，快來加入第一個！</div></div>
<div id="list-view"><div class="word-list" id="word-list"></div></div>

<div class="qr-section">
  <p>掃描 QR Code 加入</p>
  <img
    src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://scpqcteam-wq.github.io/word-cloud/&bgcolor=ffffff&color=1a1a3e"
    width="120" height="120"
    alt="QR Code"
  />
</div>

<div id="toast"></div>

<script>
  // ── Supabase ─────────────────────────────────────────
  const SUPABASE_URL  = 'https://pivxabmwxazahsvrirsv.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdnhhYm13eGF6YWhzdnJpcnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjczNjMsImV4cCI6MjA5MzEwMzM2M30.TPLGHe9yd2jamI60yUrUC20rAkPwmZDx2VRI1OI2Cfo';

  // supabase-js v2 UMD 掛在 window.supabase
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── 狀態 ─────────────────────────────────────────────
  let words    = [];
  let showCloud = true;

  const COLORS = ['#a78bfa','#60a5fa','#34d399','#f472b6','#fb923c','#facc15','#38bdf8','#c084fc','#f87171','#4ade80'];

  // ── Toast ─────────────────────────────────────────────
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2400);
  }

  // ── 從 DB 載入詞彙 ────────────────────────────────────
  async function loadWords() {
    const { data, error } = await db
      .from('word_cloud')
      .select('word, count')
      .order('count', { ascending: false });

    if (error) {
      console.error('loadWords:', error);
      return;
    }

    words = data || [];
    render();
  }

  // ── 新增詞彙 ──────────────────────────────────────────
  async function addWord(raw) {
    const word = raw.trim().replace(/\s+/g, ' ');
    if (!word) return;

    const btn = document.getElementById('btn-add');
    btn.disabled = true;

    try {
      const existing = words.find(w => w.word === word);

      if (existing) {
        const newCount = existing.count + 1;
        const { error } = await db
          .from('word_cloud')
          .update({ count: newCount })
          .eq('word', word);

        if (error) throw error;
        existing.count = newCount;
        words.sort((a, b) => b.count - a.count);
        toast('「' + word + '」又出現了！×' + newCount);

      } else {
        const { error } = await db
          .from('word_cloud')
          .insert({ word: word, count: 1 });

        if (error) throw error;
        words.unshift({ word: word, count: 1 });
        toast('「' + word + '」已加入！');
      }

      render();

    } catch (err) {
      console.error('addWord:', err);
      toast('❌ ' + (err.message || '新增失敗，請重試'));
    } finally {
      btn.disabled = false;
    }
  }

  // ── 渲染 ──────────────────────────────────────────────
  function render() {
    document.getElementById('word-total').textContent = words.length;
    renderCloud();
    renderList();
  }

  function renderCloud() {
    const wrap = document.getElementById('cloud-view');

    if (!words.length) {
      wrap.innerHTML = '<div class="empty">還沒有詞彙，快來加入第一個！</div>';
      return;
    }

    const maxCount = Math.max(...words.map(w => w.count));

    // 打亂順序讓文字雲更自然
    const shuffled = [...words].sort(() => Math.random() - 0.5);

    wrap.innerHTML = shuffled.map(function(w, i) {
      const size    = Math.round(14 + (w.count / maxCount) * 52);
      const color   = COLORS[i % COLORS.length];
      const opacity = 0.7 + (w.count / maxCount) * 0.3;
      const rotate  = Math.random() < 0.2
        ? (Math.random() > 0.5 ? 'rotate(90deg)' : 'rotate(-90deg)')
        : 'rotate(0deg)';

      return '<span class="cw" title="×' + w.count + '" style="'
        + 'font-size:' + size + 'px;'
        + 'color:' + color + ';'
        + 'opacity:' + opacity.toFixed(2) + ';'
        + 'transform:' + rotate + ';'
        + 'font-weight:' + (w.count > 1 ? '700' : '400') + ';'
        + '">' + esc(w.word) + '</span>';
    }).join('');
  }

  function renderList() {
    const container = document.getElementById('word-list');
    if (!words.length) {
      container.innerHTML = '<div class="empty">還沒有詞彙</div>';
      return;
    }
    container.innerHTML = words.map(function(w) {
      return '<div class="word-tag">'
        + '<span class="tag-word">' + esc(w.word) + '</span>'
        + '<span class="tag-count">×' + w.count + '</span>'
        + '</div>';
    }).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 切換 ─────────────────────────────────────────────
  function toggleView() {
    showCloud = !showCloud;
    const btn   = document.getElementById('btn-toggle');
    const cloud = document.getElementById('cloud-view');
    const list  = document.getElementById('list-view');

    if (showCloud) {
      btn.textContent = '☁ 文字雲';
      btn.classList.remove('list-mode');
      cloud.style.display = '';
      list.style.display  = 'none';
    } else {
      btn.textContent = '☰ 列表';
      btn.classList.add('list-mode');
      cloud.style.display = 'none';
      list.style.display  = '';
    }
  }

  // ── Realtime ──────────────────────────────────────────
  db.channel('wc')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'word_cloud' },
      function() { loadWords(); }
    )
    .subscribe();

  // ── 事件 ─────────────────────────────────────────────
  document.getElementById('btn-add').addEventListener('click', function() {
    const input = document.getElementById('word-input');
    const val = input.value;
    input.value = '';
    input.focus();
    addWord(val);
  });

  document.getElementById('word-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btn-add').click();
  });

  document.getElementById('btn-toggle').addEventListener('click', toggleView);

  // ── 啟動 ─────────────────────────────────────────────
  loadWords();
</script>
</body>
</html>
