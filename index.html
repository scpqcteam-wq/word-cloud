<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>共同文字雲</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 24px 20px 12px;
      text-align: center;
      background: linear-gradient(180deg, #1a1a3e 0%, transparent 100%);
    }

    header h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
    }

    header p {
      color: #6b7280;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .input-section {
      width: 100%;
      max-width: 600px;
      padding: 20px 20px 0;
      display: flex;
      gap: 10px;
    }

    .input-section input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #2d2d5e;
      background: #1a1a3e;
      color: #e0e0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-section input:focus {
      border-color: #a78bfa;
    }

    .input-section input::placeholder {
      color: #4b5563;
    }

    .btn-submit {
      padding: 12px 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:active { transform: scale(0.97); }

    .controls {
      width: 100%;
      max-width: 600px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .word-count {
      font-size: 0.82rem;
      color: #6b7280;
    }

    .word-count span {
      color: #a78bfa;
      font-weight: 700;
    }

    .btn-toggle {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid #a78bfa;
      background: transparent;
      color: #a78bfa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-toggle:hover {
      background: #a78bfa22;
    }

    .btn-toggle.active {
      background: #a78bfa;
      color: white;
    }

    /* 文字雲 canvas 區 */
    #cloud-section {
      width: 100%;
      max-width: 900px;
      padding: 10px 20px;
      transition: opacity 0.4s, transform 0.4s;
    }

    #cloud-section.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
    }

    #wordcloud-canvas {
      width: 100%;
      height: 420px;
      border-radius: 20px;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 100%);
      border: 1px solid #2d2d5e;
    }

    /* 列表區 */
    #list-section {
      width: 100%;
      max-width: 900px;
      padding: 10px 20px;
      transition: opacity 0.4s;
    }

    #list-section.hidden {
      opacity: 0;
      pointer-events: none;
      height: 0;
      padding: 0;
      overflow: hidden;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .word-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: #1a1a3e;
      border: 1px solid #2d2d5e;
      font-size: 0.85rem;
      animation: fadeIn 0.3s ease;
    }

    .word-tag .tag-word { color: #c4b5fd; }
    .word-tag .tag-count {
      font-size: 0.7rem;
      color: #6b7280;
      background: #2d2d5e;
      padding: 1px 6px;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* 浮動訊息 */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e4e;
      border: 1px solid #a78bfa;
      color: #c4b5fd;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* QR Code 區塊 */
    .qr-section {
      margin-top: auto;
      padding: 24px 20px 32px;
      text-align: center;
    }

    .qr-section p {
      font-size: 0.75rem;
      color: #4b5563;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    #qrcode {
      display: inline-block;
      padding: 10px;
      background: white;
      border-radius: 12px;
    }

    /* 空狀態 */
    .empty-state {
      text-align: center;
      color: #374151;
      font-size: 1rem;
      padding: 60px 0;
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <h1>✨ 共同文字雲</h1>
  <p>輸入詞彙，與大家一起創造這片雲</p>
</header>

<div class="input-section">
  <input type="text" id="word-input" placeholder="輸入你的詞彙…" maxlength="20" autocomplete="off" />
  <button class="btn-submit" id="btn-add">加入 ＋</button>
</div>

<div class="controls">
  <div class="word-count">共 <span id="word-total">0</span> 個詞彙</div>
  <button class="btn-toggle active" id="btn-toggle">☁ 文字雲</button>
</div>

<div id="cloud-section">
  <canvas id="wordcloud-canvas"></canvas>
</div>

<div id="list-section" class="hidden">
  <div class="word-list" id="word-list"></div>
</div>

<div class="qr-section">
  <p>掃描 QR Code 加入</p>
  <div id="qrcode"></div>
</div>

<div id="toast"></div>

<script>
  // ── Supabase 初始化 ──────────────────────────────────
  const SUPABASE_URL = 'https://pivxabmwxazahsvrirsv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdnhhYm13eGF6YWhzdnJpcnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjczNjMsImV4cCI6MjA5MzEwMzM2M30.TPLGHe9yd2jamI60yUrUC20rAkPwmZDx2VRI1OI2Cfo';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── 狀態 ─────────────────────────────────────────────
  let words = [];       // [{ word, count }]
  let showCloud = true; // true=文字雲, false=列表

  // ── 顏色池 ───────────────────────────────────────────
  const COLORS = [
    '#a78bfa','#60a5fa','#34d399','#f472b6',
    '#fb923c','#facc15','#38bdf8','#c084fc'
  ];
  const color = () => COLORS[Math.floor(Math.random() * COLORS.length)];

  // ── Toast ─────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── 載入所有詞彙 ──────────────────────────────────────
  async function loadWords() {
    const { data, error } = await supabase
      .from('word_cloud')
      .select('word, count')
      .order('count', { ascending: false });
    if (error) { console.error(error); return; }
    words = data || [];
    render();
  }

  // ── 新增詞彙 ──────────────────────────────────────────
  async function addWord(raw) {
    const word = raw.trim();
    if (!word) return;

    const existing = words.find(w => w.word === word);

    if (existing) {
      // 已存在 → 加計數
      const { error } = await supabase
        .from('word_cloud')
        .update({ count: existing.count + 1 })
        .eq('word', word);
      if (error) { showToast('❌ 更新失敗'); return; }
      existing.count++;
    } else {
      // 新詞
      const { error } = await supabase
        .from('word_cloud')
        .insert({ word, count: 1 });
      if (error) { showToast('❌ 新增失敗'); return; }
      words.push({ word, count: 1 });
    }

    showToast(`「${word}」已加入！`);
    render();
  }

  // ── 渲染 ──────────────────────────────────────────────
  function render() {
    // 詞彙數量
    document.getElementById('word-total').textContent = words.length;

    // 文字雲
    renderCloud();

    // 列表
    renderList();
  }

  function renderCloud() {
    const canvas = document.getElementById('wordcloud-canvas');
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    if (!words.length) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#374151';
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('還沒有詞彙，快來加入第一個！', canvas.width / 2, canvas.height / 2);
      return;
    }

    const maxCount = Math.max(...words.map(w => w.count));
    const list = words.map(w => [
      w.word,
      Math.round(20 + (w.count / maxCount) * 80)
    ]);

    WordCloud(canvas, {
      list,
      gridSize: 10,
      weightFactor: 1,
      fontFamily: 'Noto Sans TC, Microsoft JhengHei, sans-serif',
      color: () => color(),
      rotateRatio: 0.3,
      rotationSteps: 2,
      backgroundColor: 'transparent',
      shuffle: true,
      drawOutOfBound: false,
    });
  }

  function renderList() {
    const container = document.getElementById('word-list');
    const sorted = [...words].sort((a, b) => b.count - a.count);
    container.innerHTML = sorted.map(w => `
      <div class="word-tag">
        <span class="tag-word">${w.word}</span>
        <span class="tag-count">×${w.count}</span>
      </div>
    `).join('');
  }

  // ── 切換顯示模式 ─────────────────────────────────────
  function toggleView() {
    showCloud = !showCloud;
    const btn      = document.getElementById('btn-toggle');
    const cloud    = document.getElementById('cloud-section');
    const list     = document.getElementById('list-section');

    if (showCloud) {
      btn.textContent = '☁ 文字雲';
      btn.classList.add('active');
      cloud.classList.remove('hidden');
      list.classList.add('hidden');
      setTimeout(renderCloud, 50);
    } else {
      btn.textContent = '☰ 列表';
      btn.classList.remove('active');
      cloud.classList.add('hidden');
      list.classList.remove('hidden');
    }
  }

  // ── QR Code ───────────────────────────────────────────
  function initQR() {
    const url = 'https://scpqcteam-wq.github.io/word-cloud/';
    new QRCode(document.getElementById('qrcode'), {
      text: url,
      width: 100,
      height: 100,
      colorDark: '#1a1a3e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  }

  // ── 即時訂閱（Realtime）────────────────────────────────
  function subscribeRealtime() {
    supabase
      .channel('word_cloud_changes')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'word_cloud'
      }, () => loadWords())
      .subscribe();
  }

  // ── 事件綁定 ─────────────────────────────────────────
  document.getElementById('btn-add').addEventListener('click', () => {
    const input = document.getElementById('word-input');
    addWord(input.value);
    input.value = '';
    input.focus();
  });

  document.getElementById('word-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-add').click();
  });

  document.getElementById('btn-toggle').addEventListener('click', toggleView);

  // ── 視窗大小改變時重繪 ────────────────────────────────
  window.addEventListener('resize', () => {
    if (showCloud) renderCloud();
  });

  // ── 啟動 ─────────────────────────────────────────────
  initQR();
  loadWords();
  subscribeRealtime();
</script>
</body>
</html>
