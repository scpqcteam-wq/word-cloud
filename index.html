<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>共同文字雲</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b18;
      --surface: #14142b;
      --border: #252550;
      --purple: #a78bfa;
      --blue: #60a5fa;
      --green: #34d399;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      font-family: 'Microsoft JhengHei', 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 32px 24px 16px;
      text-align: center;
      background: linear-gradient(180deg, #1a1a40 0%, transparent 100%);
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(90deg, var(--purple), var(--blue), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }

    header p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* ── Input ── */
    .input-wrap {
      width: 100%;
      max-width: 560px;
      padding: 20px 20px 0;
      display: flex;
      gap: 10px;
    }

    #word-input {
      flex: 1;
      padding: 13px 18px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #word-input:focus { border-color: var(--purple); }
    #word-input::placeholder { color: var(--muted); }

    #btn-add {
      padding: 13px 22px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px #a78bfa33;
    }

    #btn-add:hover { opacity: 0.88; }
    #btn-add:active { transform: scale(0.96); }
    #btn-add:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Controls ── */
    .controls {
      width: 100%;
      max-width: 560px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat strong { color: var(--purple); font-size: 1.05rem; }

    #btn-toggle {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--purple);
      background: var(--purple);
      color: #fff;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-toggle.list-mode {
      background: transparent;
      color: var(--purple);
    }

    /* ── 文字雲 ── */
    #cloud-view {
      width: 100%;
      max-width: 960px;
      min-height: 400px;
      padding: 24px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 16px;
    }

    .cw {
      display: inline-block;
      cursor: default;
      line-height: 1.25;
      white-space: nowrap;
      transition: transform 0.25s ease, filter 0.25s ease;
      animation: pop-in 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .cw:hover {
      transform: scale(1.22) !important;
      filter: brightness(1.3);
      z-index: 1;
      position: relative;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; }
    }

    /* ── 列表 ── */
    #list-view {
      width: 100%;
      max-width: 960px;
      padding: 12px 24px;
      display: none;
    }

    .word-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .word-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.9rem;
      animation: pop-in 0.3s ease both;
    }

    .chip-word { color: #c4b5fd; font-weight: 500; }

    .chip-count {
      font-size: 0.68rem;
      color: var(--muted);
      background: var(--border);
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* ── Empty ── */
    .empty {
      color: #2d2d5e;
      font-size: 1rem;
      text-align: center;
      padding: 80px 0;
      width: 100%;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 560px;
      height: 1px;
      background: var(--border);
      margin: 8px 20px;
    }

    /* ── QR ── */
    .qr-section {
      padding: 28px 20px 40px;
      text-align: center;
      margin-top: auto;
    }

    .qr-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .qr-box {
      display: inline-block;
      padding: 10px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 0 40px #a78bfa22;
    }

    .qr-url {
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1e1e4e;
      border: 1px solid var(--purple);
      color: #c4b5fd;
      padding: 10px 26px;
      border-radius: 20px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── 連線指示燈 ── */
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s;
      flex-shrink: 0;
    }

    .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  </style>
</head>
<body>

<header>
  <h1>✨ 共同文字雲</h1>
  <p>輸入詞彙，與大家一起創造這片雲</p>
</header>

<div class="input-wrap">
  <input type="text" id="word-input" placeholder="輸入你的詞彙…" maxlength="20" autocomplete="off" />
  <button id="btn-add">加入 ＋</button>
</div>

<div class="controls">
  <div class="stat">
    <span class="status-dot" id="status-dot"></span>
    共 <strong id="word-total">0</strong> 個詞彙
  </div>
  <button id="btn-toggle">☁ 文字雲</button>
</div>

<div id="cloud-view"><div class="empty">還沒有詞彙，快來加入第一個！</div></div>
<div id="list-view"><div class="word-grid" id="word-grid"></div></div>

<div class="qr-section">
  <div class="qr-label">掃描加入</div>
  <div class="qr-box">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=https://scpqcteam-wq.github.io/word-cloud/&bgcolor=ffffff&color=0b0b18&margin=2"
      width="130" height="130" alt="QR Code"
    />
  </div>
  <div class="qr-url">scpqcteam-wq.github.io/word-cloud</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js';
import {
  getFirestore, collection, doc,
  getDoc, setDoc, onSnapshot,
  increment, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js';

/* ── Firebase 初始化 ─────────────────────────────── */
const app = initializeApp({
  apiKey:            'AIzaSyA0_-HZD9YVU0E9345r6QifHdn3Pi7jZwE',
  authDomain:        'scpqcteam-wq-s.firebaseapp.com',
  projectId:         'scpqcteam-wq-s',
  storageBucket:     'scpqcteam-wq-s.firebasestorage.app',
  messagingSenderId: '984749830436',
  appId:             '1:984749830436:web:10e3b47fd4927a484e43b1'
});

const db       = getFirestore(app);
const colRef   = collection(db, 'wordcloud_words');

/* ── 狀態 ───────────────────────────────────────── */
let words     = [];
let showCloud = true;

const COLORS = [
  '#a78bfa','#60a5fa','#34d399','#f472b6',
  '#fb923c','#facc15','#38bdf8','#c084fc',
  '#f87171','#4ade80','#e879f9','#22d3ee',
  '#fbbf24','#86efac','#93c5fd'
];

/* ── Toast ──────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── 新增詞彙 ───────────────────────────────────── */
async function addWord(raw) {
  const word = raw.trim().replace(/\s+/g, '');
  if (!word) return;

  const btn = document.getElementById('btn-add');
  btn.disabled = true;

  try {
    const ref  = doc(db, 'wordcloud_words', word);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      await setDoc(ref, { count: increment(1) }, { merge: true });
      toast(`「${word}」又出現了！`);
    } else {
      await setDoc(ref, { count: 1, created_at: serverTimestamp() });
      toast(`✨ 「${word}」加入成功！`);
    }
  } catch (err) {
    console.error(err);
    toast('❌ ' + (err.message || '新增失敗'));
  } finally {
    btn.disabled = false;
  }
}

/* ── 即時監聽 ───────────────────────────────────── */
onSnapshot(colRef, (snap) => {
  words = snap.docs
    .map(d => ({ id: d.id, count: d.data().count || 1 }))
    .sort((a, b) => b.count - a.count);

  document.getElementById('status-dot').classList.add('live');
  render();
});

/* ── 渲染 ───────────────────────────────────────── */
function render() {
  document.getElementById('word-total').textContent = words.length;
  if (showCloud) renderCloud();
  else           renderList();
}

function renderCloud() {
  const wrap = document.getElementById('cloud-view');
  if (!words.length) {
    wrap.innerHTML = '<div class="empty">還沒有詞彙，快來加入第一個！</div>';
    return;
  }

  const max  = Math.max(...words.map(w => w.count));
  const pool = [...words].sort(() => Math.random() - 0.5);

  wrap.innerHTML = pool.map((w, i) => {
    const size    = Math.round(16 + (w.count / max) * 60);
    const color   = COLORS[i % COLORS.length];
    const weight  = w.count > 1 ? 800 : 400;
    const opacity = +(0.6 + (w.count / max) * 0.4).toFixed(2);
    const tilt    = Math.random() < 0.12
      ? (Math.random() > 0.5 ? 'rotate(90deg)' : 'rotate(-90deg)')
      : 'rotate(0deg)';

    return `<span class="cw" title="出現 ${w.count} 次" style="
      font-size:${size}px;color:${color};
      opacity:${opacity};transform:${tilt};
      font-weight:${weight};
    ">${esc(w.id)}</span>`;
  }).join('');
}

function renderList() {
  const grid = document.getElementById('word-grid');
  if (!words.length) {
    grid.innerHTML = '<div class="empty">還沒有詞彙</div>';
    return;
  }
  grid.innerHTML = words.map(w =>
    `<div class="word-chip">
      <span class="chip-word">${esc(w.id)}</span>
      <span class="chip-count">×${w.count}</span>
    </div>`
  ).join('');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── 切換視圖 ───────────────────────────────────── */
function toggleView() {
  showCloud = !showCloud;
  const btn   = document.getElementById('btn-toggle');
  const cloud = document.getElementById('cloud-view');
  const list  = document.getElementById('list-view');

  if (showCloud) {
    btn.textContent = '☁ 文字雲';
    btn.classList.remove('list-mode');
    cloud.style.display = '';
    list.style.display  = 'none';
    renderCloud();
  } else {
    btn.textContent = '☰ 列表';
    btn.classList.add('list-mode');
    cloud.style.display = 'none';
    list.style.display  = '';
    renderList();
  }
}

/* ── 事件 ───────────────────────────────────────── */
document.getElementById('btn-add').addEventListener('click', () => {
  const input = document.getElementById('word-input');
  const val   = input.value;
  input.value = '';
  input.focus();
  addWord(val);
});

document.getElementById('word-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-add').click();
});

document.getElementById('btn-toggle').addEventListener('click', toggleView);
</script>
</body>
</html>
